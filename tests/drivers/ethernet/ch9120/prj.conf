# Enable networking
CONFIG_NETWORKING=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_OFFLOAD=y

# Your driver
CONFIG_ETH_CH9120=y

# Disable LwIP — CH9120 owns TCP/IP
CONFIG_NET_IPV4=n
CONFIG_NET_IPV6=n
CONFIG_NET_TCP=n
CONFIG_NET_UDP=n

# UART
CONFIG_UART_INTERRUPT_DRIVEN=y

# GPIO
CONFIG_GPIO=y

# Zephyr test framework
CONFIG_ZTEST=y
CONFIG_ZTEST_NEW_API=y

# Logging — essential during bring up
CONFIG_LOG=y
CONFIG_ETH_CH9120_LOG_LEVEL_DBG=y

# Stack sizes — networking needs more than default
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048